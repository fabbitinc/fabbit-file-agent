<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabbit</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="mandatory-update-overlay" style="display:none;">
      <div class="update-dialog">
        <h2>필수 업데이트</h2>
        <p id="update-message">보안 업데이트가 필요합니다.</p>
        <p id="update-version"></p>
        <p id="update-notes"></p>
        <button id="update-btn">업데이트 설치</button>
        <p class="update-hint">이 업데이트를 설치해야 앱을 사용할 수 있습니다.</p>
      </div>
    </div>

    <main class="container">
      <h1>Fabbit</h1>
      <p>Hello World!</p>

      <form class="row" id="greet-form">
        <input id="greet-input" placeholder="이름을 입력하세요..." />
        <button type="submit">인사하기</button>
      </form>
      <p id="greet-msg"></p>
    </main>
  </body>
</html>
